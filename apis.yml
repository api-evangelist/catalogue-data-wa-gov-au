aid: catalogue-data-wa-gov-au
name: Western Australia Data Catalogue
description: >-
  Western Australia Data Catalogue is a state government open-data portal for Australia running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 2,909 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
