apis:
  - aid: catalogue-data-wa-gov-au:catalog
    name: Western Australia Data Catalogue CKAN Action API
    description: >-
      CKAN Action API for Western Australia Data Catalogue, a consistent JSON-over-HTTP interface over a catalog of 2,909 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://catalogue.data.wa.gov.au/api/3/action/.
    humanURL: https://catalogue.data.wa.gov.au
    baseURL: https://catalogue.data.wa.gov.au/api/3/action
